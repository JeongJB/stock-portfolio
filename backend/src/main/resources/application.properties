spring.application.name=stock-portfolio
spring.cloud.function.definition=apiGatewayHandler

kis.base-url=${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
kis.appkey-parameter=${KIS_APPKEY_PARAMETER:/portfolio/kis/app-key}
kis.appsecret-parameter=${KIS_APPSECRET_PARAMETER:/portfolio/kis/app-secret}
kis.fx-probe-symbol=${KIS_FX_PROBE_SYMBOL:AAPL}
kis.fx-probe-exchange=${KIS_FX_PROBE_EXCHANGE:NAS}
fx.fallback-url=${FX_FALLBACK_URL:https://api.frankfurter.app}
aws.region=${AWS_REGION:ap-northeast-2}
