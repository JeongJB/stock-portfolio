name: frontend-deploy

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'
      - 'infra/deploy-frontend.sh'
      - '.github/workflows/frontend-deploy.yml'
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm --prefix frontend ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          audience: sts.amazonaws.com

      # Stack Output 에서 invoke URL 추출 + Usage plan 경유로 API key 값 추출.
      # API key 는 add-mask 로 로그에서 가린 뒤 GITHUB_ENV 로 다음 step 들에 전달.
      - name: Resolve API base URL and API key
        run: |
          set -euo pipefail
          STACK=stock-portfolio
          REGION=ap-northeast-2

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --region "$REGION" \
            --query 'Stacks[0].Outputs[?OutputKey==`BackendApiInvokeUrl`].OutputValue' \
            --output text)

          USAGE_PLAN_ID=$(aws apigateway get-usage-plans \
            --region "$REGION" \
            --query "items[?name=='stock-portfolio-prod-usage-plan'].id | [0]" \
            --output text)

          API_KEY_ID=$(aws apigateway get-usage-plan-keys \
            --region "$REGION" \
            --usage-plan-id "$USAGE_PLAN_ID" \
            --query 'items[0].id' \
            --output text)

          API_KEY=$(aws apigateway get-api-key \
            --region "$REGION" \
            --api-key "$API_KEY_ID" \
            --include-value \
            --query 'value' \
            --output text)

          echo "::add-mask::$API_KEY"
          echo "VITE_API_BASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "VITE_API_KEY=$API_KEY" >> "$GITHUB_ENV"

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Deploy to S3 + invalidate CloudFront
        run: bash infra/deploy-frontend.sh

      - name: Smoke check frontend URL
        run: |
          set -euo pipefail
          URL=$(aws cloudformation describe-stacks \
            --stack-name stock-portfolio \
            --region ap-northeast-2 \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendUrl`].OutputValue' \
            --output text)
          echo "Frontend URL: $URL"
          # Basic Auth 게이팅 때문에 인증 없이는 401 이 정상 — 응답 헤더만 확인.
          curl -sI -o /dev/null -w "HTTP %{http_code}\n" "$URL" || true
